name: CI

on:
  push:
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  NO_COLOR: "1"
  # Release channel for akgentic-* dependencies. On a release branch set this
  # to that branch (e.g. version-1.x); sibling akgentic-* packages are built
  # from this branch into the local wheelhouse.
  RELEASE_BRANCH: master
  # Transitive closure of akgentic-* dependencies, space-separated. uv resolves
  # the graph from the wheelhouse, so order does not matter.
  AKGENTIC_DEPS: "akgentic-core akgentic-llm akgentic-tool akgentic-team akgentic-agent akgentic-catalog"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout akgentic-infra
        uses: actions/checkout@v6
        with:
          # full history so the test/* branch guard can diff against origin/master
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      # Build every akgentic-* dependency from RELEASE_BRANCH into a local
      # wheelhouse. uv pip install --find-links then resolves them from there;
      # all other (PyPI) deps still come from the default index.
      - name: Build akgentic-* dependency wheelhouse
        run: |
          mkdir -p wheelhouse
          for dep in ${AKGENTIC_DEPS}; do
            echo "::group::build ${dep} @ ${RELEASE_BRANCH}"
            git clone --depth 1 --branch "${RELEASE_BRANCH}" \
              "https://github.com/b12consulting/${dep}.git" "/tmp/${dep}"
            uv build --wheel --out-dir wheelhouse "/tmp/${dep}"
            echo "::endgroup::"
          done
          ls -1 wheelhouse

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install --find-links wheelhouse -e ".[dev]"

      # --no-sync: run in the wheelhouse-built venv without re-resolving from a
      # lockfile (there is no project lockfile in this install model).
      - name: Type checking
        run: uv run --no-sync mypy src/

      - name: Linting
        run: uv run --no-sync ruff check src/

      - name: Enforce no MagicMock in integration and e2e tests
        run: |
          if grep -r "MagicMock" tests/integration/ --include='*.py' -l | grep -v '/test_cli\.py$'; then
            echo "::error::MagicMock found in integration tests — integration tests must not use mocks"
            exit 1
          fi
          if grep -r "MagicMock" tests/e2e/ --include='*.py' -l 2>/dev/null; then
            echo "::error::MagicMock found in e2e tests — e2e tests must not use mocks"
            exit 1
          fi

      - name: Enforce zero src/ changes on test branches
        if: startsWith(github.head_ref || github.ref_name, 'test/')
        run: |
          changed=$(git diff origin/master --name-only -- src/ || true)
          if [ -n "$changed" ]; then
            echo "::error::src/ changes detected on a test/* branch — test branches must not modify production code"
            echo "$changed"
            exit 1
          fi

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout akgentic-infra
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Build akgentic-* dependency wheelhouse
        run: |
          mkdir -p wheelhouse
          for dep in ${AKGENTIC_DEPS}; do
            echo "::group::build ${dep} @ ${RELEASE_BRANCH}"
            git clone --depth 1 --branch "${RELEASE_BRANCH}" \
              "https://github.com/b12consulting/${dep}.git" "/tmp/${dep}"
            uv build --wheel --out-dir wheelhouse "/tmp/${dep}"
            echo "::endgroup::"
          done

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install --find-links wheelhouse -e ".[dev]"

      - name: Run unit tests with coverage
        run: >
          uv run --no-sync pytest tests/
          --ignore=tests/integration/
          --ignore=tests/e2e/
          --cov=akgentic.infra
          --cov-report=term-missing
          --cov-report=json:coverage.json
          --cov-fail-under=80

      - name: Update coverage badge
        if: github.ref_name == 'master' && github.event_name == 'push'
        run: |
          COVERAGE=$(python -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered_display']))")
          if [ "$COVERAGE" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$COVERAGE" -ge 80 ]; then COLOR="green"
          elif [ "$COVERAGE" -ge 70 ]; then COLOR="yellow"
          else COLOR="red"; fi
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COVERAGE}%\",\"color\":\"${COLOR}\"}" > badge.json
          gh gist edit d0b84268aa19a7460fe186dbf23e500d -f coverage.json badge.json
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

  integration-tests:
    if: false  # temporarily disabled — deadlock under pytest-cov, investigating
    runs-on: ubuntu-latest
    steps:
      - name: Checkout akgentic-infra
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Build akgentic-* dependency wheelhouse
        run: |
          mkdir -p wheelhouse
          for dep in ${AKGENTIC_DEPS}; do
            git clone --depth 1 --branch "${RELEASE_BRANCH}" \
              "https://github.com/b12consulting/${dep}.git" "/tmp/${dep}"
            uv build --wheel --out-dir wheelhouse "/tmp/${dep}"
          done

      - name: Create virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install --find-links wheelhouse -e ".[dev]"

      # --cov-fail-under=0 overrides pyproject.toml fail_under=90
      # so integration coverage is reported without a gate.
      - name: Run integration tests
        run: >
          uv run --no-sync pytest tests/integration/ -v
          -o "addopts="
          --cov=akgentic.infra
          --cov-report=term-missing
          --cov-fail-under=0

  # Optional job — not required for PR merge. Succeeds (skipped) when
  # OPENAI_API_KEY is absent; runs real-LLM integration tests when present.
  integration-llm:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Check for API key
        if: env.OPENAI_API_KEY == ''
        run: |
          echo "::notice::OPENAI_API_KEY not available — skipping LLM integration tests"

      - name: Checkout akgentic-infra
        if: env.OPENAI_API_KEY != ''
        uses: actions/checkout@v6

      - name: Install uv
        if: env.OPENAI_API_KEY != ''
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python 3.12
        if: env.OPENAI_API_KEY != ''
        run: uv python install 3.12

      - name: Build akgentic-* dependency wheelhouse
        if: env.OPENAI_API_KEY != ''
        run: |
          mkdir -p wheelhouse
          for dep in ${AKGENTIC_DEPS}; do
            git clone --depth 1 --branch "${RELEASE_BRANCH}" \
              "https://github.com/b12consulting/${dep}.git" "/tmp/${dep}"
            uv build --wheel --out-dir wheelhouse "/tmp/${dep}"
          done

      - name: Create virtual environment
        if: env.OPENAI_API_KEY != ''
        run: uv venv

      - name: Install dependencies
        if: env.OPENAI_API_KEY != ''
        run: uv pip install --find-links wheelhouse -e ".[dev]"

      - name: Run integration tests with real LLM
        if: env.OPENAI_API_KEY != ''
        run: >
          uv run --no-sync pytest tests/integration/ -v
          -o "addopts="
